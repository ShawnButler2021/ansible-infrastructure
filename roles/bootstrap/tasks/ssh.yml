- name: Install OpenSSH server for Debian
  apt: 
    name: openssh-server
    state: present
    update_cache: yes
  become: yes
  when: ansible_os_family == "Debian"

- name: Install OpenSSH server for RHEL
  dnf:
    name: openssh-server
    state: present
    update_cache: yes
  become: yes
  when: ansible_os_family == "RedHat"


- name: Apply SSH config
  template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config
    owner: root
    group: root
    mode: '0600'
  notify: Restart SSH

- name: Validate SSH configuration
  command: sshd -t

- name: Restart sshd
  ansible.builtin.service:
    name: sshd
    state: reloaded
  become: yes

