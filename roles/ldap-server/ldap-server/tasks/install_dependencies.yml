

- name: Install OpenLDAP on Debian
  apt:
    name: "{{ openldap_installs_debian }}"
    state: present
    update_cache: yes
  when: ansible_os_family == "Debian"
  become: yes


- name: Install OpenLDAP on RHEL
  dnf:
    name: openldap
    state: present
    update_cache: yes
  when: ansible_os_family == "RedHat"
  become: yes
